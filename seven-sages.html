<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>天府七圣 - 玄荒道府</title>
    <style>
        body {
            font-family: "微软雅黑", sans-serif;
            background-color: #f5f5f5;
            padding: 50px;
            background-image: url(images/c1.png); /* 背景图路径 */
            background-size: clamp(100%, 80vw, 100%);
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll;
            min-height: 150vh;
            position: relative;
            z-index: 0;
            /* 新增：让body内所有内容水平居中 */
            text-align: center;
        }

        /* 半透明黑色幕布（遮罩层） */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* 透明度可调 */
            z-index: -1;
            pointer-events: none;
        }

        h1 {
            color: #f3f5f7;
            text-align: center; /* 保留，双重保障居中 */
            margin-bottom: 30px;
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
        }
        .sages-list {
            max-width: 800px;
            margin: 0 auto; /* 水平居中 */
            font-size: 18px;
            line-height: 2;
            color: #f5f3f3;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px 30px;
            border-radius: 8px;
            /* 新增：让列表内文字居中 */
            text-align: center;
        }
        /* 新增：让有序列表li也居中（解决默认左对齐问题） */
        .sages-list ol {
            list-style-position: inside; /* 序号和文字一起居中 */
            padding-left: 0; /* 清除默认左内边距 */
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #4285f4;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            /* 新增：按钮居中（依赖body的text-align: center） */
            text-align: center;
        }
        .back-btn:hover {
            background-color: #3367d6;
        }
    </style>
</head>
<body>
    <h1>天府七圣</h1>
    <div class="sages-list">
        <p>天府七圣为天府的核心，在天元纪结束之后退隐。每一个都是天府的传奇：</p>
        <ol>
            <li>天府一圣 幻海神尊 萧骛杰 - 掌「幻」之道则</li>
            <li>天府二圣 玉阳山人 齐玉阳 - 掌「力」之道则</li>
            <li>天府三圣 星宗神主 石辰阳 - 掌「轮回」道则</li>
            <li>天府四圣 太平居士 李玄奕 - 掌「符」之道则</li>
            <li>天府五圣 神军圣将 木灵锐 - 掌「兵」之道则</li>
            <li>天府六圣 神机子 龙镜渊 - 掌「阵」之道则</li>
            <li>天府七圣 醍醐仙人 毕子诚 - 掌「魂」之道则</li>
        </ol>
    </div>
    <a href="Dao.html" class="back-btn">返回天府</a>
</body>
</html>
